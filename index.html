<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            padding: 20px;
        }

        .score-board {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: all;
            cursor: pointer;
        }

        .start-screen.hidden {
            display: none;
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: all;
            cursor: pointer;
        }

        .game-over-screen.hidden {
            display: none;
        }

        .start-content, .game-over-content {
            text-align: center;
            color: white;
        }

        .game-title {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        .start-instruction {
            font-size: 20px;
            margin-bottom: 30px;
            color: #ffffff;
            line-height: 1.6;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over-score {
            font-size: 28px;
            margin-bottom: 30px;
            color: #ffd700;
        }

        .restart-text {
            font-size: 18px;
            color: #ffffff;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .high-score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="ui-overlay">
            <div class="score-board" id="scoreBoard">Score: 0</div>
            <div class="high-score" id="highScore">Best: 0</div>
        </div>

        <div class="start-screen" id="startScreen">
            <div class="start-content">
                <div class="game-title">🐦</div>
                <div class="game-title">FLAPPY BIRD</div>
                <div class="start-instruction">
                    Click or Press SPACE<br>to fly up<br><br>
                    Avoid the pipes!
                </div>
                <div class="restart-text">Click to Start</div>
            </div>
        </div>

        <div class="game-over-screen hidden" id="gameOverScreen">
            <div class="game-over-content">
                <div class="game-over-title">Game Over!</div>
                <div class="game-over-score">Score: <span id="finalScore">0</span></div>
                <div class="restart-text">Click to Play Again</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreBoard = document.getElementById('scoreBoard');
        const finalScoreSpan = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');

        // Game variables
        let gameActive = false;
        let gameStarted = false;
        let score = 0;
        let highScore = localStorage.getItem('flappyBirdHighScore') || 0;

        // Bird object
        const bird = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            lift: -10,
            maxVelocity: 10
        };

        // Pipe object
        const pipes = [];
        const pipeWidth = 80;
        const pipeGap = 130;
        const pipeDistance = 250;

        let nextPipeX = 400;

        // Update high score display
        function updateHighScoreDisplay() {
            highScoreDisplay.textContent = `Best: ${highScore}`;
        }

        updateHighScoreDisplay();

        // Draw bird
        function drawBird() {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(bird.x + bird.width / 2, bird.y + bird.height / 2, bird.width / 2, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 20, bird.y + 10, 4, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#FF6B00';
            ctx.beginPath();
            ctx.moveTo(bird.x + 25, bird.y + 12);
            ctx.lineTo(bird.x + 32, bird.y + 12);
            ctx.lineTo(bird.x + 28, bird.y + 15);
            ctx.fill();
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.fillStyle = '#2ecc71';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 5;

                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, canvas.height - pipe.topHeight - pipeGap);

                ctx.shadowColor = 'transparent';
            });
        }

        // Update pipes
        function updatePipes() {
            pipes.forEach((pipe, index) => {
                pipe.x -= 5;

                // Check if pipe passed bird (score point)
                if (pipe.x + pipeWidth < bird.x && !pipe.scored) {
                    pipe.scored = true;
                    score++;
                    scoreBoard.textContent = `Score: ${score}`;
                }

                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }
            });

            // Add new pipes
            if (nextPipeX < canvas.width) {
                const topHeight = Math.random() * (canvas.height - pipeGap - 100) + 50;
                pipes.push({
                    x: nextPipeX,
                    topHeight: topHeight,
                    scored: false
                });
                nextPipeX += pipeDistance;
            }
        }

        // Update bird physics
        function updateBird() {
            bird.velocity += bird.gravity;
            bird.velocity = Math.min(bird.velocity, bird.maxVelocity);
            bird.y += bird.velocity;
        }

        // Collision detection
        function checkCollisions() {
            // Ground and ceiling collision
            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                endGame();
                return;
            }

            // Pipe collision
            pipes.forEach(pipe => {
                if (
                    bird.x < pipe.x + pipeWidth &&
                    bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.topHeight || bird.y + bird.height > pipe.topHeight + pipeGap)
                ) {
                    endGame();
                }
            });
        }

        // Flap
        function flap() {
            bird.velocity = bird.lift;
        }

        // Start game
        function startGame() {
            gameActive = true;
            gameStarted = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            score = 0;
            scoreBoard.textContent = `Score: 0`;
            pipes.length = 0;
            nextPipeX = 400;
            bird.y = 300;
            bird.velocity = 0;
            gameLoop();
        }

        // End game
        function endGame() {
            gameActive = false;
            finalScoreSpan.textContent = score;
            gameOverScreen.classList.remove('hidden');

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('flappyBirdHighScore', highScore);
                updateHighScoreDisplay();
            }
        }

        // Game loop
        function gameLoop() {
            if (!gameActive) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update
            updateBird();
            updatePipes();
            checkCollisions();

            // Draw
            drawPipes();
            drawBird();

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameStarted) {
                    startGame();
                } else if (gameActive) {
                    flap();
                }
            }
        });

        gameContainer.addEventListener('click', () => {
            if (!gameStarted) {
                startGame();
            } else if (!gameActive) {
                startGame();
            } else if (gameActive) {
                flap();
            }
        });

        startScreen.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        gameOverScreen.addEventListener('click', (e) => {
            e.stopPropagation();
        });
    </script>
</body>
</html>
